<div class="auth-wrapper" style="padding: 50px; text-align: center;">
  <h2>AlgoArena Login</h2>
  
  <div style="margin-bottom: 10px;">
    <input type="email" [(ngModel)]="loginData.email" placeholder="Email" style="padding: 8px;">
  </div>
  
  <div style="margin-bottom: 10px;">
    <input type="password" [(ngModel)]="loginData.password" placeholder="Password" style="padding: 8px;">
  </div>

  <button (click)="onLoginClick()" style="padding: 10px 20px; cursor: pointer;">
    Enter Arena
  </button>
</div>
