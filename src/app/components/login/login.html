<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome Back!</h2>
    <form (submit)="onLogin()">
      <div class="input-group">
        <input id="email" type="email" [(ngModel)]="email" name="email" required placeholder=" ">
        <label for="email">Enter your Email</label>
      </div>

      <div class="input-group">
        <input id="password" type="password" [(ngModel)]="password" name="password" required placeholder=" ">
        <label for="password">Enter your Password</label>
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? 'Processing...' : 'Log-in' }}
      </button>
    </form>
    <p class="footer-text">New to AlgoArena? <a routerLink="/signup">Create Account</a></p>
  </div>
</div>
