<div class="auth-wrapper">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <form (submit)="onLogin()">
      <div class="input-group">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <p class="footer-text">New to AlgoArena? <a routerLink="/signup">Create Account</a></p>
  </div>
</div>
