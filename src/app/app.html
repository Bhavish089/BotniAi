<div class="app-container">
  
  @if (authService.isLoggedIn()) {
    <nav class="main-nav">
      <div class="logo">AlgoArena</div>
      <div class="nav-links">
        <a routerLink="/dashboard">Dashboard</a>
        <span class="user-tag">
          {{ authService.currentUser()?.full_name || 'User' }}
        </span>
      </div>
    </nav>
  }

  <main class="content-area">
    <router-outlet></router-outlet>
  </main>

</div>
